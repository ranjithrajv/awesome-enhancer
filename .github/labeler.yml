# Configuration for labeling pull requests

# Label PRs based on conventional commit prefixes
feat:
  - head-branch: ['^feat']

fix:
  - head-branch: ['^fix']

chore:
  - head-branch: ['^chore']

docs:
  - head-branch: ['^docs']

test:
  - head-branch: ['^test']

refactor:
  - head-branch: ['^refactor']

style:
  - head-branch: ['^style']

perf:
  - head-branch: ['^perf']

ci:
  - head-branch: ['^ci']

# Label PRs based on changed files
'ci/cd':
  - changed-files:
      - any-glob-to-any-file: '.github/workflows/**'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '*.md'
          - 'docs/**'
          - 'LICENSE'

source-code:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**'
          - 'bin/**'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'test/**'
          - 'tests/**'
          - '__tests__/**'
          - '*.test.ts'
          - '*.spec.ts'

configuration:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'tsconfig.json'
          - 'bun.lock'
          - '.prettierrc*'
          - '.eslintrc*'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package-lock.json'
          - 'bun.lock'
