name: Bun CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - 'vitest*.ts'
      - 'tsconfig*.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - 'vitest*.ts'
      - 'tsconfig*.json'
      - '.github/workflows/**'

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun: [latest]
      fail-fast: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Install dependencies
        run: bun install

      - name: Build core (required for web typecheck)
        run: bun run --filter='@awesome-enhancer/core' build

      - name: Run tests
        run: bun run test:coverage

      - name: Run typecheck
        run: bun run typecheck

      - name: Upload coverage artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: coverage/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint:all

      - name: Check formatting
        run: bun run format --check

      - name: Check for unused code (knip)
        run: bunx knip --exclude dependencies,unlisted,binaries

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun: [latest]
      fail-fast: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

  e2e:
    name: E2E Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun: [latest]
      fail-fast: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Test CLI help
        run: bun run dev --help

      - name: Test global installation simulation
        if: matrix.os != 'windows-latest'
        run: |
          cd packages/cli
          bun link
          awesome-enhancer --help
          bun unlink
